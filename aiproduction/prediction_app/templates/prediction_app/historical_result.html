<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Historical Data Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-success">
                    <div class="card-header bg-success text-white text-center">
                        <h4>Historical Data Log (Training Set)</h4>
                    </div>
                    <div class="card-body text-center">
                        <h5 class="text-muted">Location ID: {{ record.pulocation.pulocation_id }}</h5>
                        <p class="fs-5 mt-3">Target Date: <br> <strong>{{ record.datetime }}</strong></p>
                        
                        <hr>
                        
                        <h2 class="display-4 text-success">{{ record.trip_count }}</h2>
                        <p class="text-muted">Actual Trip Count</p>
                        
                        <div class="text-start bg-light p-3 rounded mt-3">
                            <small><strong>Last 24 hour (Lag 24h):</strong> {{ record.lag_24h }}</small><br>
                            <small><strong>Last 3 hours Average:</strong> {{ record.rollin_mean_3h|floatformat:2 }}</small>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <a href="{% url 'prediction_app:home' %}" class="btn btn-outline-secondary">New Query</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
