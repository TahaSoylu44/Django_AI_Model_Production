<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-danger rounded-lg mt-5">
                    <div class="card-header bg-danger text-white text-center py-3">
                        <h3 class="font-weight-light my-1">Delete Account</h3>
                    </div>
                    <div class="card-body p-4 text-center">
                        
                        <div class="alert alert-warning mb-4" role="alert">
                            <h5 class="alert-heading fw-bold">Warning!</h5>
                            <p class="mb-0">Are you sure you want to delete your account? This action is <strong>permanent</strong> and cannot be undone. All your data will be permanently erased.</p>
                        </div>

                        <form method="post" novalidate>
                            {% csrf_token %}
                            
                            <div class="text-start mb-4">
                                {{ form.as_p }}
                            </div>
                            
                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'prediction_app:home' %}" class="btn btn-secondary px-4 fw-bold">Cancel</a>
                                <button type="submit" class="btn btn-danger px-4 fw-bold shadow-sm">Yes, Delete My Account</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
